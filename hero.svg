<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="900" height="260" fill="none" font-family="'Segoe UI', 'Poppins', system-ui, sans-serif">
  <defs>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#56D364"/>
      <stop offset="45%" stop-color="#3FE06B"/>
      <stop offset="100%" stop-color="#1A7F37"/>
    </linearGradient>
    <linearGradient id="tag" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3FE06B"/>
      <stop offset="100%" stop-color="#238636"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3FE06B" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#3FE06B" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="900" height="260" fill="#0d1117"/>
  <ellipse cx="450" cy="130" rx="360" ry="150" fill="url(#halo)"/>

  <g transform="translate(450 130)">
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="18s" repeatCount="indefinite"/>
      <ellipse rx="320" ry="86" fill="none" stroke="#238636" stroke-opacity="0.55" stroke-width="1.5"/>
      <ellipse rx="320" ry="86" fill="none" stroke="#3FE06B" stroke-opacity="0.28" stroke-width="1.5" transform="rotate(32)"/>
      <circle cx="320" cy="0" r="5" fill="#56D364" filter="url(#glow)"/>
      <circle cx="-320" cy="0" r="3.5" fill="#3FE06B" filter="url(#glow)"/>
    </g>
  </g>

  <text x="450" y="128" text-anchor="middle" font-size="82" font-weight="800" letter-spacing="10"
        fill="url(#green)" filter="url(#glow)">DIEZELS</text>

  <rect x="330" y="150" width="240" height="3" rx="2" fill="url(#tag)">
    <animate attributeName="width" values="0;240;240" dur="2.4s" fill="freeze"/>
    <animate attributeName="x" values="450;330;330" dur="2.4s" fill="freeze"/>
  </rect>

  <text x="450" y="190" text-anchor="middle" font-size="19" font-weight="600" letter-spacing="4"
        fill="#8b949e">SYSTEM ENGINEER · MCSERVERHOST</text>
  <text x="450" y="216" text-anchor="middle" font-size="13" font-weight="500" letter-spacing="2"
        fill="#3FB950">Backend · Infrastructure · Automation</text>
</svg>
